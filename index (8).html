<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fırat-GPT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface2: #1a1a26; --border: #2a2a3d;
    --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e8c8;
    --text: #e8e8f0; --text2: #9090a8;
    --user-bg: #1e1e32; --bot-bg: #141420; --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(67,232,200,0.06) 0%, transparent 50%); animation: bgPulse 8s ease-in-out infinite alternate; pointer-events: none; z-index: 0; }
  @keyframes bgPulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
  header { position: relative; z-index: 10; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-text h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(90deg, var(--accent), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-text p { font-size: 11px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent3); font-family: 'IBM Plex Mono', monospace; }
  .status-dot { width: 7px; height: 7px; background: var(--accent3); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #chat { position: relative; z-index: 5; flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px 20px; gap: 16px; animation: fadeUp 0.6s ease; }
  .welcome-icon { width: 72px; height: 72px; background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(67,232,200,0.2)); border: 1px solid rgba(108,99,255,0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 8px; }
  .welcome h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .welcome p { font-size: 14px; color: var(--text2); max-width: 320px; line-height: 1.6; font-family: 'IBM Plex Mono', monospace; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; max-width: 500px; }
  .suggestion-btn { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'IBM Plex Mono', monospace; }
  .suggestion-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.08); }
  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; max-width: 800px; width: 100%; margin: 0 auto; }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .message.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .message.bot .avatar { background: linear-gradient(135deg, var(--accent3), var(--accent)); }
  .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; max-width: calc(100% - 50px); }
  .message.user .bubble { background: var(--user-bg); border: 1px solid rgba(108,99,255,0.2); border-top-right-radius: 4px; text-align: right; font-family: 'Noto Naskh Arabic', 'Syne', sans-serif; }
  .message.bot .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 4px; font-family: 'Noto Naskh Arabic', 'Syne', sans-serif; font-size: 13px; white-space: pre-wrap; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 8px 4px; }
  .typing span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: typing 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent3); }
  .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent2); }
  @keyframes typing { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }
  .input-area { position: relative; z-index: 10; padding: 16px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); }
  .input-wrap { display: flex; gap: 10px; align-items: flex-end; max-width: 800px; margin: 0 auto; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s; }
  .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }
  #input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; font-family: 'Noto Naskh Arabic', 'Syne', sans-serif; resize: none; max-height: 120px; line-height: 1.5; direction: auto; }
  #input::placeholder { color: var(--text2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  #sendBtn { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent3)); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; color: white; }
  #sendBtn:hover { transform: scale(1.05); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .input-footer { text-align: center; margin-top: 8px; font-size: 10px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; opacity: 0.6; }
  .error-bubble { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3); color: var(--accent2); padding: 10px 14px; border-radius: var(--radius); font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <div class="header-text">
    <h1>Fırat-GPT</h1>
    <p>powered by Groq · RAG</p>
  </div>
  <div class="status"><div class="status-dot"></div>online</div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🎓</div>
    <h2>Fırat-GPT'ye Hoş Geldiniz</h2>
    <p>Fırat Üniversitesi yönetmelikleri hakkında Türkçe, Arapça veya İngilizce soru sorabilirsiniz.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="useSuggestion(this.textContent)">Form-30 nedir?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this.textContent)">Yüksek lisans jüri sayısı?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this.textContent)">ما هو نموذج Form-30؟</button>
      <button class="suggestion-btn" onclick="useSuggestion(this.textContent)">Kayıt şartları nelerdir?</button>
      <button class="suggestion-btn" onclick="useSuggestion(this.textContent)">ما شروط القبول؟</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Soru sorun / اكتب سؤالك هنا..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-footer">Fırat Üniversitesi · Yapay Zeka Asistanı · جامعة فرات</div>
</div>

<script>
var HF_SPACE = "https://muhammed82641-firat-gpt.hf.space";

function addMessage(text, role) {
  var welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = "message " + role;
  div.innerHTML = '<div class="avatar">' + (role==='user'?'👤':'🤖') + '</div><div class="bubble">' + text + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  var welcome = document.getElementById('welcome');
  if(welcome) welcome.remove();
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'message bot'; div.id = 'typing';
  div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing');
  if(t) t.remove();
}

async function sendMessage() {
  var input = document.getElementById('input');
  var btn = document.getElementById('sendBtn');
  var question = input.value.trim();
  if(!question) return;
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;
  addMessage(question, 'user');
  addTyping();

  try {
    // الخطوة 1: إرسال السؤال
    var res = await fetch(HF_SPACE + "/gradio_api/call/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data: [question, null] })
    });

    var json = await res.json();
    var eventId = json.event_id;

    // الخطوة 2: استقبال الجواب
    var streamRes = await fetch(HF_SPACE + "/gradio_api/call/chat/" + eventId);
    var text = await streamRes.text();

    // استخراج الجواب من النص
    var lines = text.split('\n');
    var answer = "";
    for(var i = 0; i < lines.length; i++) {
      if(lines[i].startsWith('data:')) {
        try {
          var data = JSON.parse(lines[i].replace('data: ', ''));
          if(Array.isArray(data) && data.length > 0) {
            answer = data[0];
          }
        } catch(e) {}
      }
    }

    if(!answer) answer = "Üzgünüm, bir hata oluştu.";

    removeTyping();
    addMessage(answer, 'bot');

  } catch(err) {
    removeTyping();
    var chat = document.getElementById('chat');
    var div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = '<div class="avatar">🤖</div><div class="error-bubble">⚠️ Hata: ' + err.message + '</div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  btn.disabled = false;
  input.focus();
}

function useSuggestion(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('input').addEventListener('keydown', function(e) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
